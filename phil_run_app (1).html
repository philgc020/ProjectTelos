<style>
/* ═══════════════════════════════════════════════════════
   LONDON MARATHON BRAND TOKENS
   Core red: #E8002D  Ink: #0A0A0A  White: #FFFFFF
   Secondary palette (used sparingly in pairs):
     Teal:   #00B5AD   Yellow: #FFD100
     Orange: #FF6B00   Purple: #7B2D8B
     Navy:   #002060
   Typography: Barlow Condensed (display/headlines)
                Barlow (body)
                IBM Plex Mono (data/metrics)
   Patterns: 26.2° diagonal lines, geometric shapes
════════════════════════════════════════════════════════ */
:root {
  /* Core */
  --red:      #E8002D;
  --red-dk:   #B8001F;
  --red-lt:   #FF3355;
  --red-bg:   #FEF0F3;
  --ink:      #0A0A0A;
  --white:    #FFFFFF;
  --off-white:#F7F7F5;
  --light:    #F0F0EE;
  --rule:     #E0E0DC;
  --mid:      #6B6B6B;
  --muted:    #A0A0A0;

  /* Secondary (used sparingly) */
  --teal:     #00857A;
  --teal-lt:  #00B5AD;
  --teal-bg:  #E6F5F4;
  --yellow:   #E8B800;
  --yellow-lt:#FFD100;
  --yellow-bg:#FFFBE6;
  --orange:   #E85000;
  --orange-bg:#FFF2EB;
  --navy:     #002060;
  --navy-bg:  #E6EAF0;
  --purple:   #7B2D8B;
  --purple-bg:#F5EDF7;

  /* Nav */
  --nav-h:    58px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-t:   env(safe-area-inset-top, 0px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; background:var(--white); }
body {
  height:100%; overflow:hidden;
  background:var(--off-white); color:var(--ink);
  font-family:'Barlow', sans-serif; font-size:15px; line-height:1.5;
  display:flex; flex-direction:column;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ── VIEWS ── */
.view { display:none; flex:1; overflow-y:auto; overflow-x:hidden;
        -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; }
.view.active { display:block; }

/* ── BOTTOM NAV ── */
.bnav {
  display:grid; grid-template-columns:repeat(3,1fr);
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--white); border-top:2px solid var(--rule);
  flex-shrink:0; z-index:100;
}
.nb {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px;
  border:none; background:transparent; color:var(--muted);
  cursor:pointer; font-family:'Barlow Condensed', sans-serif;
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; padding:0; min-height:44px;
  transition:color .15s; position:relative;
}
.nb::after {
  content:''; position:absolute; top:0; left:20%; right:20%;
  height:2px; background:var(--red); transform:scaleX(0);
  transition:transform .2s; border-radius:0 0 2px 2px;
}
.nb.active { color:var(--red); }
.nb.active::after { transform:scaleX(1); }
.nb svg { width:22px; height:22px; stroke:currentColor; fill:none;
           stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* ── SHARED COMPONENTS ── */
.section-label {
  font-family:'Barlow Condensed', sans-serif; font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:2.5px; color:var(--muted);
  margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--rule);
}
.card {
  background:var(--white); border:1px solid var(--rule);
  border-radius:0; overflow:hidden;
}

/* LM Pattern background — 26.2° diagonal lines */
.lm-pattern {
  background-image: repeating-linear-gradient(
    26.2deg,
    transparent, transparent 8px,
    rgba(232,0,45,0.06) 8px, rgba(232,0,45,0.06) 9px
  );
}

/* Session colour coding — bright pill tags */
.tag-rest     { background:#F0F0EE; color:var(--muted); }
.tag-base     { background:var(--teal-bg); color:var(--teal); }
.tag-recovery { background:var(--teal-bg); color:var(--teal); }
.tag-tempo    { background:var(--yellow-bg); color:var(--yellow); }
.tag-tenk     { background:var(--red-bg); color:var(--red-dk); }
.tag-mar      { background:var(--navy-bg); color:var(--navy); }
.tag-strength { background:#F0F0EE; color:var(--mid); }
.tag-race     { background:var(--yellow-bg); color:var(--orange); }
.tag-target   { background:var(--red); color:var(--white); }
.tag-long     { background:var(--purple-bg); color:var(--purple); }

/* Dot colours */
.dot { width:9px; height:9px; border-radius:1px; flex-shrink:0; }
.d-rest     { background:var(--rule); }
.d-base     { background:var(--teal); }
.d-recovery { background:var(--teal-lt); }
.d-tempo    { background:var(--yellow); }
.d-tenk     { background:var(--red); }
.d-mar      { background:var(--navy); }
.d-strength { background:var(--muted); }
.d-race     { background:var(--orange); }
.d-target   { background:var(--red); }
.d-long     { background:var(--purple); }

/* Text colours */
.c-rest     { color:var(--muted); }
.c-base     { color:var(--teal); }
.c-recovery { color:var(--teal); }
.c-tempo    { color:var(--yellow); }
.c-tenk     { color:var(--red); }
.c-mar      { color:var(--navy); }
.c-strength { color:var(--mid); }
.c-race     { color:var(--orange); }
.c-target   { color:var(--red); }
.c-long     { color:var(--purple); }

/* ── DASHBOARD ── */
.dash-hero {
  background:#f4e1e5; color:var(--ink);
  padding:calc(20px + var(--safe-t)) 20px 24px;
  position:relative; overflow:hidden;
}
/* 26.2° pattern on hero */
.dash-hero::before {
  content:''; position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    26.2deg,
    transparent, transparent 14px,
    rgba(232,0,45,0.07) 14px, rgba(232,0,45,0.07) 15px
  );
  pointer-events:none;
}
/* Large background number */
.dash-hero::after {
  content:'26.2'; position:absolute; right:-10px; bottom:-30px;
  font-family:'Barlow Condensed',sans-serif; font-size:160px; font-weight:900;
  color:rgba(232,0,45,0.08); line-height:1; pointer-events:none;
  letter-spacing:-4px;
}
.dh-eye {
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted);
  margin-bottom:8px; position:relative;
}
.dh-title {
  font-family:'Barlow Condensed',sans-serif; font-weight:900;
  font-size:38px; line-height:1; letter-spacing:-0.5px;
  margin-bottom:4px; position:relative; text-transform:uppercase;
  color:var(--ink);
}
.dh-phase {
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  color:var(--muted); position:relative; margin-bottom:20px;
}

.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; position:relative; }
.stat-box {
  background:rgba(232,0,45,0.08);
  padding:9px 14px;
  display:flex; align-items:baseline; gap:7px;
}
.sb-val {
  font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800;
  line-height:1; color:var(--red); flex-shrink:0;
}
.sb-lbl {
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  text-transform:uppercase; letter-spacing:1px; color:var(--muted);
}

.dash-body { padding:0 0 24px; }
.dash-section { padding:20px 16px 0; }

/* Target cards */
.target-card {
  background:var(--white); border-left:4px solid var(--red);
  padding:9px 14px 10px; margin-bottom:8px;
  border-top:1px solid var(--rule); border-right:1px solid var(--rule); border-bottom:1px solid var(--rule);
}
.tc-top {
  display:flex; justify-content:space-between;
  align-items:center; margin-bottom:7px;
}
.tc-left { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; min-width:0; }
.tc-label {
  font-family:'Barlow Condensed',sans-serif; font-size:16px;
  font-weight:800; text-transform:uppercase; letter-spacing:.5px;
  white-space:nowrap;
}
.tc-date {
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  color:var(--muted); white-space:nowrap;
}
.tc-val {
  font-family:'Barlow Condensed',sans-serif; font-size:24px;
  font-weight:900; line-height:1; color:var(--red);
  white-space:nowrap; flex-shrink:0;
}
.prog-track { background:var(--light); height:5px; overflow:hidden; margin-bottom:5px; }
.prog-bar { height:100%; background:var(--red); transition:width .6s ease; }
.prog-lbls { display:flex; justify-content:space-between;
             font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); }

/* Today banner */
.today-banner {
  display:flex; align-items:center; gap:12px;
  background:var(--red); color:var(--white);
  padding:14px 16px; cursor:pointer; position:relative; overflow:hidden;
}
.today-banner::before {
  content:''; position:absolute; inset:0;
  background-image: repeating-linear-gradient(26.2deg,transparent,transparent 10px,rgba(255,255,255,0.06) 10px,rgba(255,255,255,0.06) 11px);
  pointer-events:none;
}
.today-banner.rest-day { background:var(--light); color:var(--mid); cursor:default; }
.tb-icon { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.2);
           display:flex; align-items:center; justify-content:center;
           flex-shrink:0; font-size:18px; position:relative; }
.tb-body { flex:1; min-width:0; position:relative; }
.tb-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
          text-transform:uppercase; letter-spacing:2px; opacity:.8; margin-bottom:2px; }
.tb-name { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
           text-transform:uppercase; line-height:1.1; }
.tb-arr { font-size:22px; opacity:.7; position:relative; flex-shrink:0; }

/* Week rows */
.week-row {
  display:flex; align-items:center; gap:10px;
  padding:13px 0; border-bottom:1px solid var(--rule); cursor:pointer;
}
.week-row:last-child { border-bottom:none; }
.wr-day { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
          text-transform:uppercase; letter-spacing:1px; color:var(--muted);
          width:32px; flex-shrink:0; }
.wr-dt  { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);
          width:42px; flex-shrink:0; }
.wr-name { flex:1; font-size:14px; font-weight:600; min-width:0;
           overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tick {
  width:28px; height:28px; border-radius:50%;
  border:2px solid var(--rule); display:flex; align-items:center;
  justify-content:center; flex-shrink:0; transition:all .15s;
}
.tick.done { background:var(--teal); border-color:var(--teal); }
.tick svg { width:13px; height:13px; stroke:white; stroke-width:3; }

/* Recent */
.recent-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--rule); }
.recent-item:last-child { border-bottom:none; }
.ri-body { flex:1; min-width:0; }
.ri-name { font-size:14px; font-weight:600; }
.ri-date { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); margin-top:2px; }
.ri-note { font-size:12px; color:var(--mid); font-style:italic; margin-top:3px; }

/* ── TODAY VIEW ── */
.today-wrap { padding:calc(20px + var(--safe-t)) 16px 24px; }
.tv-date { font-family:'IBM Plex Mono',monospace; font-size:11px;
           letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.tv-heading { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900;
              text-transform:uppercase; margin-bottom:20px; }

.sess-card { background:var(--white); border:1px solid var(--rule); margin-bottom:14px; overflow:hidden; }
.sc-stripe { height:5px; background:var(--red); }
.sc-head { padding:16px 16px 12px; border-bottom:1px solid var(--rule); }
.sc-tag-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.sc-tag-pill { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
               text-transform:uppercase; letter-spacing:1.5px; padding:3px 8px; }
.sc-wfh-pill { font-family:'IBM Plex Mono',monospace; font-size:10px;
               background:var(--navy-bg); color:var(--navy); padding:3px 7px;
               border:1px solid rgba(0,32,96,.15); }
.sc-name { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900;
           text-transform:uppercase; line-height:1.1; }
.sc-body { padding:16px; }
.sc-desc { font-size:14px; line-height:1.75; color:var(--mid); margin-bottom:14px; }
.sc-meta { background:var(--light); border-left:3px solid var(--red);
           padding:10px 14px; font-family:'IBM Plex Mono',monospace; font-size:12px;
           line-height:1.6; margin-bottom:14px; }
.note-lbl { font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase;
            letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
.note-input {
  width:100%; background:var(--light); border:1.5px solid var(--rule);
  padding:12px 14px; color:var(--ink);
  font-family:'Barlow', sans-serif; font-size:14px; resize:none;
  outline:none; margin-bottom:14px; min-height:80px;
  -webkit-appearance:none; border-radius:0;
}
.note-input:focus { border-color:var(--red); }
.note-input::placeholder { color:var(--muted); }
.action-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.act-btn {
  padding:15px 12px; border:2px solid; font-family:'Barlow Condensed', sans-serif;
  font-size:15px; font-weight:800; cursor:pointer; text-transform:uppercase;
  letter-spacing:1px; text-align:center; transition:all .15s;
  min-height:52px; -webkit-appearance:none; border-radius:0;
}
.btn-done { background:var(--white); color:var(--teal); border-color:var(--teal); }
.btn-done.active { background:var(--teal); color:var(--white); border-color:var(--teal); }
.btn-move { background:var(--white); color:var(--red); border-color:var(--red); }
.move-wrap { background:var(--light); border-left:3px solid var(--yellow);
             padding:14px; margin-bottom:14px; display:none; }
.move-wrap.open { display:block; }
.move-wrap label { font-family:'IBM Plex Mono',monospace; font-size:10px;
                   text-transform:uppercase; letter-spacing:2px; color:var(--muted);
                   display:block; margin-bottom:8px; }
.date-input { width:100%; background:var(--white); border:1.5px solid var(--rule);
              padding:11px 13px; color:var(--ink);
              font-family:'IBM Plex Mono',monospace; font-size:14px;
              outline:none; -webkit-appearance:none; border-radius:0; margin-bottom:10px; }
.date-input:focus { border-color:var(--red); }
.confirm-btn { width:100%; padding:12px; background:var(--red); color:var(--white);
               border:none; font-family:'Barlow Condensed',sans-serif;
               font-size:15px; font-weight:800; text-transform:uppercase;
               letter-spacing:1px; cursor:pointer; border-radius:0; }
.rest-card { background:var(--white); border:1px solid var(--rule); padding:40px 20px; text-align:center; }
.rest-icon { font-size:44px; margin-bottom:14px; }
.rest-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; text-transform:uppercase; margin-bottom:6px; }
.rest-sub { font-size:13px; color:var(--muted); }

/* ── CALENDAR ── */
.cal-header {
  background:var(--white); border-bottom:2px solid var(--ink);
  padding:calc(14px + var(--safe-t)) 16px 12px;
  position:sticky; top:0; z-index:50;
}
.cal-h-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-h-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
.month-nav { display:flex; align-items:center; gap:8px; }
.m-arr { width:36px; height:36px; background:var(--ink); border:none; color:var(--white);
         font-size:20px; display:flex; align-items:center; justify-content:center;
         cursor:pointer; border-radius:0; flex-shrink:0; font-weight:700; }
.m-lbl { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mid);
         min-width:95px; text-align:center; }
.phase-chip { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
              text-transform:uppercase; letter-spacing:1px; padding:5px 10px;
              display:inline-block; }

.cal-body { padding:10px 12px 24px; }
.week-card { background:var(--white); border:1px solid var(--rule);
             margin-bottom:10px; overflow:hidden; }
.week-card.milestone { border-color:var(--red); border-width:2px; }
.wc-head {
  display:flex; align-items:center; gap:8px; padding:8px 14px;
  border-bottom:2px solid var(--ink); flex-wrap:wrap;

// ── STATE ──────────────────────────────────────────────────
const SK = 'philRun_v4';
let ST = {done:{}, notes:{}, moved:{}};
function loadST(){ try{const s=localStorage.getItem(SK);if(s)ST=JSON.parse(s);}catch(e){} }
function saveST(){ try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){toast('⚠ Storage issue — use Export to back up',4000);} }
function key(wk,d){ return wk+'-'+d; }
function isDone(wk,d){ return !!ST.done[key(wk,d)]; }
function getNote(wk,d){ return ST.notes[key(wk,d)]||''; }
function getMoved(wk,d){ return ST.moved[key(wk,d)]||null; }
function setDone(wk,d,v){ ST.done[key(wk,d)]=v; saveST(); }
function setNote(wk,d,v){ ST.notes[key(wk,d)]=v; saveST(); }
function setMoved(wk,d,v){ ST.moved[key(wk,d)]=v; saveST(); }

function phaseCol(p){ for(const[k,v] of Object.entries(PHASECOLS)) if(p.startsWith(k)) return v; return '#0A0A0A'; }

// ── DATE UTILS ─────────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const TSTR = fD(TODAY);
function fD(d){ return d.toISOString().split('T')[0]; }
function pD(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function niceD(s){ return pD(s).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function fullD(s){ return pD(s).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }

// ── NAV ────────────────────────────────────────────────────
let cV='dash';
function nav(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  document.getElementById('nb-'+id).classList.add('active');
  cV=id;
  ({dash:rDash,cal:rCal,stats:rStats})[id]();
}

// ── STATS HELPERS ──────────────────────────────────────────
function curWk(){
  for(const w of PLAN){if(TODAY>=pD(w.start)&&TODAY<=pD(w.end))return w;}
  return PLAN[0];
}
function todaySess(){
  for(const w of PLAN) for(let d=0;d<7;d++){
    const dd=w.days[String(d)], eff=getMoved(w.week,d)||dd.date;
    if(eff===TSTR) return{wk:w.week,d,dd,w};
  }
  return null;
}
function getStats(){
  let done=0,total=0,streak=0,wksDone=0,races=0,longs=0,ints=0;
  const doneDates=[];
  for(const w of PLAN){
    let wH=false;
    for(let d=0;d<7;d++){
      const dd=w.days[String(d)],col=dd.session.color;
      if(col!=='rest'&&col!=='strength')total++;
      if(isDone(w.week,d)){done++;doneDates.push(dd.date);wH=true;
        if(col==='race'||col==='target')races++;
        if(col==='long')longs++;
        if(col==='tenk')ints++;
      }
    }
    if(wH)wksDone++;
  }
  const sorted=[...new Set(doneDates)].sort().reverse();
  const chk=new Date(TODAY);
  for(const ds of sorted){if(ds===fD(chk)){streak++;chk.setDate(chk.getDate()-1);}else if(ds<fD(chk))break;}
  const dow=(TODAY.getDay()+6)%7;
  const ws=new Date(TODAY);ws.setDate(ws.getDate()-dow);
  const we=new Date(ws);we.setDate(we.getDate()+7);
  let wt=0,wd=0;
  for(const w of PLAN) for(let d=0;d<7;d++){
    const dd=w.days[String(d)],dt=pD(dd.date);
    if(dt>=ws&&dt<we&&dd.session.color!=='rest'){wt++;if(isDone(w.week,d))wd++;}
  }
  return{done,total,streak,wksDone,races,longs,ints,wt,wd};
}

// ── DASHBOARD ─────────────────────────────────────────────
function rDash(){
  const st=getStats(),cw=curWk();
  const p10k=Math.min(Math.round((cw.week-1)/29*100),100);
  const pmar=Math.min(Math.round((cw.week-1)/53*100),100);
  const ts=todaySess();

  let wrows='';
  for(let d=0;d<7;d++){
    const dd=cw.days[String(d)],col=dd.session.color,dn=isDone(cw.week,d);
    wrows+=`<div class="week-row" onclick="openModal(${cw.week},${d})">
      <span class="wr-day">${dd.dayName}</span>
      <span class="wr-dt">${dd.date.slice(5).replace('-','/')}</span>
      <div class="dot ${DOTCLS[col]||'d-rest'}"></div>
      <span class="wr-name ${col==='rest'?'c-rest':''}">${dd.session.name}</span>
      <div class="tick ${dn?'done':''}">${dn?'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
    </div>`;
  }

  let recHtml='';
  const recs=[];
  for(const w of PLAN) for(let d=0;d<7;d++) if(isDone(w.week,d)) recs.push({wk:w.week,d,dd:w.days[String(d)]});
  recs.sort((a,b)=>b.dd.date.localeCompare(a.dd.date));

    const n=getNote(r.wk,r.d);
    return`<div class="recent-item">

        <div class="ri-date">${niceD(r.dd.date)} · Week ${r.wk}</div>

// ── TODAY BANNER ACTIONS ──────────────────────────────────────────────────
function tsbToggleDone(wk, d) {
  const cur = isDone(wk, d);
  setDone(wk, d, !cur);
  const btn = document.getElementById('tsb-done-btn');
  if (btn) { btn.textContent = !cur ? '✓ Completed' : 'Mark Done'; btn.classList.toggle('active', !cur); }
  // Update done badge in header
  rDash();
  toast(!cur ? 'SESSION COMPLETE!' : 'Marked incomplete');
}
function tsbDoMove(wk, d) {
  const v = document.getElementById('tsb-move-date').value;
  if (v) { setMoved(wk, d, v); rDash(); toast('SESSION MOVED TO ' + niceD(v)); }
}

// ── TODAY (kept for modal compatibility) ─────────────────────────────────
function rToday(){
  const el=document.getElementById('today-inner');
  const dateStr=TODAY.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const ts=todaySess();
  if(!ts||ts.dd.session.color==='rest'){
    el.innerHTML=`<div class="tv-date">${dateStr}</div>
      <div class="tv-heading">Today</div>
      <div class="rest-card"><div class="rest-icon">🛌</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Recover well. Legs up. No running today.</div>
      </div>`;
    return;
  }
  const{wk,d,dd,w}=ts; const sess=dd.session,col=sess.color,dn=isDone(wk,d);
  el.innerHTML=`
    <div class="tv-date">${dateStr}</div>
    <div class="tv-heading">Today's Session</div>
    <div class="sess-card">
      <div class="sc-stripe" style="background:${STRIPE[col]||'var(--red)'}"></div>
      <div class="sc-head">
        <div class="sc-tag-row">
          <span class="sc-tag-pill ${TAGCLS[col]||'tag-rest'}">${sess.tag}</span>
          ${dd.isWFH?'<span class="sc-wfh-pill">🏠 WFH</span>':''}
        </div>
        <div class="sc-name">${sess.name}</div>
      </div>
      <div class="sc-body">
        <div class="sc-desc">${sess.desc}</div>
        ${sess.meta?`<div class="sc-meta">${sess.meta}</div>`:''}
        <div class="note-lbl">Session Notes</div>
        <textarea class="note-input" id="tv-note" placeholder="Log HR, pace, GCT, how it felt..." oninput="setNote(${wk},${d},this.value)">${getNote(wk,d)}</textarea>
        <div class="move-wrap" id="tv-move">
          <label>Reschedule to</label>
          <input class="date-input" type="date" id="tv-move-date">
          <button class="confirm-btn" onclick="tvMove(${wk},${d})">Confirm Move</button>
        </div>
        <div class="action-row">
          <button class="act-btn btn-done${dn?' active':''}" id="tv-done-btn" onclick="tvDone(${wk},${d})">${dn?'✓ Completed':'Mark Done'}</button>
          <button class="act-btn btn-move" onclick="document.getElementById('tv-move').classList.toggle('open')">Reschedule</button>
        </div>
      </div>
    </div>
    <div style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:10px;">Week ${wk} · ${w.phase} · ${w.vol}</div>`;
}
function tvDone(wk,d){
  const cur=isDone(wk,d);setDone(wk,d,!cur);
  const b=document.getElementById('tv-done-btn');
  if(b){b.textContent=!cur?'✓ Completed':'Mark Done';b.classList.toggle('active',!cur);}
  toast(!cur?'SESSION COMPLETE!':'Marked incomplete');
  rDash();
}
function tvMove(wk,d){
  const v=document.getElementById('tv-move-date').value;
  if(v){setMoved(wk,d,v);rToday();rDash();toast('SESSION MOVED');}
}

// ── CALENDAR ──────────────────────────────────────────────
const MONTHS=(()=>{const m={};for(const w of PLAN){const d=pD(w.start),k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(!m[k])m[k]=[];m[k].push(w);}return Object.entries(m);})();
let calIdx=0;
function calPrev(){if(calIdx>0){calIdx--;rCal();}}
function calNext(){if(calIdx<MONTHS.length-1){calIdx++;rCal();}}

function rCal(){
  const[mk,mw]=MONTHS[calIdx];
  const mo=pD(mk+'-01');
  document.getElementById('cal-month-lbl').textContent=mo.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const fw=mw[0];
  const pc=phaseCol(fw.phase);
  document.getElementById('cal-phase-strip').innerHTML=
    `<span class="phase-chip" style="background:${pc};color:#fff;">${fw.phase} · ${fw.vol}</span>`;

  let html='';
  for(const w of mw){
    const mile=Object.values(w.days).some(dd=>dd.session.color==='target'||(dd.session.color==='race'&&dd.session.name.toUpperCase().includes('RACE')));
    html+=`<div class="week-card${mile?' milestone':''}">
      <div class="wc-head" style="border-bottom:3px solid ${phaseCol(w.phase)}">
        <span class="wc-wk">Week ${w.week}</span>
        <span class="wc-phase">${w.phase}</span>
        <span class="wc-vol">${w.vol}</span>
        <span class="wc-dates">${pD(w.start).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}–${pD(w.end).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>
      </div>`;
    for(let d=0;d<7;d++){
      const dd=w.days[String(d)],sess=dd.session,col=sess.color;
      const dn=isDone(w.week,d),mv=getMoved(w.week,d),isToday=dd.date===TSTR;
      const dt=pD(dd.date);
      html+=`<div class="cal-day${dn?' done-day':''}${isToday?' today-day':''}${col==='target'?' is-target':''}" onclick="openModal(${w.week},${d})">
        <div class="cd-left">
          <div class="cd-dn${isToday?' cd-today-dt':''}">${dd.dayName}</div>
          <div class="cd-dt${isToday?' cd-today-dt':''}">${dt.getDate()}</div>
        </div>
        <div class="dot ${DOTCLS[col]||'d-rest'}" style="margin-top:2px"></div>
        <div class="cd-mid">
          <div class="cd-tag-row">
            <span class="cd-tag-pill ${TAGCLS[col]||'tag-rest'}">${sess.tag}</span>
            ${dd.isWFH?'<span class="cd-wfh">WFH</span>':''}
            ${mv?'<span class="cd-moved">moved</span>':''}
            ${dn?'<span class="cd-done-badge">✓</span>':''}

// ── CHECK FOR PENDING ALARM FROM PREVIOUS SESSION ────────────────────────
(function checkPendingAlarm() {
  if (!NOTIF_SUPPORTED) return;
  try {
    const prefs = loadNotifPrefs();
    if (!prefs.pendingAlarm || getNotifPermission() !== 'granted') return;
    const { title, body, tag, fireAt } = prefs.pendingAlarm;
    const now = Date.now();
    if (fireAt <= now + 60000) {
      // Already past or within 1 min — fire immediately
      new window.Notification(title, { body, tag, icon: getNotifIconUri() });
      prefs.pendingAlarm = null;
      saveNotifPrefs(prefs);
    } else {
      // Reschedule the remaining time
      const remaining = fireAt - now;
      clearTimeout(window._notifTimer);
      window._notifTimer = setTimeout(() => {
        try {
          new window.Notification(title, { body, tag, icon: getNotifIconUri() });
          const p = loadNotifPrefs(); p.pendingAlarm = null; saveNotifPrefs(p);
        } catch(e) {}
      }, remaining);
    }
  } catch(e) { console.warn('Pending alarm check failed:', e.message); }
})();

const NOTIF_SUPPORTED = (
  typeof window !== 'undefined' &&
  'Notification' in window
);

const NOTIF_KEY = 'philRunNotif_v1';

function loadNotifPrefs() {
  try {
    const s = localStorage.getItem(NOTIF_KEY);
    return s ? JSON.parse(s) : { enabled: false, hour: 7, minute: 0, lastScheduled: null };
  } catch(e) { return { enabled: false, hour: 7, minute: 0, lastScheduled: null }; }
}

function saveNotifPrefs(prefs) {
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(prefs)); } catch(e) {}
}

function getNotifPermission() {
  if (!NOTIF_SUPPORTED) return 'unsupported';
  try { return window.Notification.permission; } catch(e) { return 'unsupported'; }
}

  const todayData = PLAN.reduce((found, w) => {

      const dd = w.days[String(d)];
      const moved = (() => {
        try { return (JSON.parse(localStorage.getItem('philRun_v4') || '{}')).moved?.[w.week+'-'+d]; }
        catch(e){ return null; }
      })();
      const eff = moved || dd.date;
      if (eff === TSTR) return { sess: dd.session, wk: w.week, phase: w.phase };
    }
    return null;
  }, null);

  if (!todayData || todayData.sess.color === 'rest') {
    return { title: '🛌 Rest Day', body: 'No session today — recover well.' };
  }

  const sess = todayData.sess;
  const emoji = {
    rest:'🛌', base:'🏃', recovery:'🚶', tempo:'⚡', tenk:'🔥',
    mar:'💪', strength:'🏋️', race:'🏆', target:'🎯', long:'🗺️'
  }[sess.color] || '🏃';

  const day = new Date().getDay();
  const wfhFlag = (day === 2 || day === 5) ? ' · WFH day' : '';

  return {
    title: `${emoji} ${sess.name}`,
    body: sess.desc.substring(0, 100) + (sess.desc.length > 100 ? '…' : '') + wfhFlag
  };
}

  const now = new Date();
  const next = new Date();
  next.setHours(hour, minute, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next.getTime() - now.getTime();
}

// ── Schedule notification via direct setTimeout (works on file://) ─────────
async function scheduleNotification() {
  if (!NOTIF_SUPPORTED) return;
  const prefs = loadNotifPrefs();
  if (!prefs.enabled) return;
  if (getNotifPermission() !== 'granted') return;

  try {
    const { title, body } = getTodayNotifText();
    const delayMs = msUntilNextAlarm(prefs.hour, prefs.minute);
    const icon = getNotifIconUri();

    // Clear any existing scheduled notification for today
    if (window._notifTimer) clearTimeout(window._notifTimer);

    window._notifTimer = setTimeout(() => {
      try {
        new window.Notification(title, {
          body,
          icon,
          badge: icon,
          tag: 'daily-training-' + TSTR,
          vibrate: [200, 100, 200],
          requireInteraction: false
        });
      } catch(e) { console.warn('Notification display failed:', e.message); }
    }, delayMs);

    prefs.lastScheduled = TSTR;
    saveNotifPrefs(prefs);

    const hrs = Math.round(delayMs / 360000) / 10;
    console.log('Notification scheduled in ' + hrs + 'h: "' + title + '"');
  } catch(e) {
    console.warn('Notification scheduling failed:', e.message);
  }
}

// ── Request permission & enable ─────────────────────────────────────────
async function requestNotifPermission() {
  if (!NOTIF_SUPPORTED) {
    toast('NOTIFICATIONS NOT SUPPORTED ON THIS DEVICE');
    return false;
  }
  try {
    let permission = getNotifPermission();
    if (permission === 'default') {
      permission = await window.Notification.requestPermission();
    }
    if (permission === 'granted') {
      const prefs = loadNotifPrefs();
      prefs.enabled = true;
      saveNotifPrefs(prefs);
      await scheduleNotification();
      return true;
    } else {
      toast('NOTIFICATIONS BLOCKED — ENABLE IN PHONE SETTINGS');
      return false;
    }
  } catch(e) {
    console.warn('Permission request failed:', e.message);
    toast('COULD NOT REQUEST PERMISSION');
    return false;
  }
}

// ── Permission banner logic ─────────────────────────────────────────────
(function initNotifBanner() {
  try {
    const banner = document.getElementById('notif-banner');
    const allowBtn = document.getElementById('notif-allow-btn');
    const dismissBtn = document.getElementById('notif-dismiss-btn');

    if (!banner) return;

    const prefs = loadNotifPrefs();
    const perm = getNotifPermission();

    // Show banner only if: notifications supported, not yet granted, not yet enabled
    if (NOTIF_SUPPORTED && perm !== 'granted' && perm !== 'denied' && !prefs.enabled) {
      const visitCount = parseInt(localStorage.getItem('visitCount') || '0') + 1;
      localStorage.setItem('visitCount', String(visitCount));
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (visitCount >= 2 || isStandalone) {
        setTimeout(() => {
          if (getNotifPermission() !== 'granted') banner.classList.add('show');
        }, 5000);
      }
    }

    if (allowBtn) {
      allowBtn.addEventListener('click', async () => {
        banner.classList.remove('show');
        const granted = await requestNotifPermission();
        if (granted) toast('🔔 DAILY REMINDERS ENABLED');
        if (typeof initNotifSettingsUI === 'function') initNotifSettingsUI();
      });
    }
    if (dismissBtn) {
      dismissBtn.addEventListener('click', () => banner.classList.remove('show'));
    }
  } catch(e) {
    console.warn('Notification banner init failed:', e.message);
  }
})();

// ── Re-schedule on every app open ──────────────────────────────────────
window.addEventListener('load', () => {
  if (!NOTIF_SUPPORTED) return;
  try {
    const prefs = loadNotifPrefs();
    if (prefs.enabled && getNotifPermission() === 'granted' && prefs.lastScheduled !== TSTR) {
      setTimeout(scheduleNotification, 2000);
    }
  } catch(e) { console.warn('Load reschedule failed:', e.message); }
});

// ── Reschedule when app comes to foreground ─────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden || !NOTIF_SUPPORTED) return;
  try {
    const prefs = loadNotifPrefs();
    if (prefs.enabled && getNotifPermission() === 'granted' && prefs.lastScheduled !== TSTR) {
      scheduleNotification();
    }
  } catch(e) { console.warn('Visibility reschedule failed:', e.message); }
});

// ── Expose for settings UI ──────────────────────────────────────────────
window.notifSystem = {
  getPrefs: loadNotifPrefs,
  savePrefs: saveNotifPrefs,
  schedule: scheduleNotification,
  requestPermission: requestNotifPermission,
  getPermissionStatus: getNotifPermission,
  isSupported: () => NOTIF_SUPPORTED
};
</script>


<script>
// ── NOTIFICATION SETTINGS UI FUNCTIONS ──────────────────────────────────

function initNotifSettingsUI() {
  if (!window.notifSystem) return;
  const prefs = window.notifSystem.getPrefs();
  const perm = window.notifSystem.getPermissionStatus();

  // Toggle
  const toggle = document.getElementById('notif-toggle');
  if (toggle) toggle.checked = prefs.enabled && perm === 'granted';

  // Time input
  const timeInput = document.getElementById('notif-time-input');
  if (timeInput) {
    const h = String(prefs.hour).padStart(2, '0');
    const m = String(prefs.minute).padStart(2, '0');
    timeInput.value = `${h}:${m}`;
  }

  // Permission status
  const permEl = document.getElementById('notif-perm-status');
  if (permEl) {
    const labels = { granted: '✓ Allowed', denied: '✗ Blocked', default: 'Not set', unsupported: 'Not supported' };
    const cls = { granted: 'granted', denied: 'denied', default: 'default', unsupported: 'default' };
    permEl.textContent = labels[perm] || perm;
    permEl.className = 'notif-status ' + (cls[perm] || 'default');
  }

  // Hide time row if notifications disabled
  const timeRow = document.getElementById('notif-time-row');
  if (timeRow) timeRow.style.display = (prefs.enabled && perm === 'granted') ? 'flex' : 'none';
  const testRow = document.getElementById('notif-test-row');
  if (testRow) testRow.style.display = perm === 'granted' ? 'flex' : 'none';
}

async function handleNotifToggle(checked) {
  if (!window.notifSystem) return;
  if (checked) {
    const granted = await window.notifSystem.requestPermission();
    if (!granted) {
      const toggle = document.getElementById('notif-toggle');
      if (toggle) toggle.checked = false;
      return;
    }
    toast('🔔 REMINDERS ENABLED');
  } else {
    const prefs = window.notifSystem.getPrefs();
    prefs.enabled = false;
    window.notifSystem.savePrefs(prefs);
    toast('REMINDERS DISABLED');
  }
  initNotifSettingsUI();
}

function saveNotifTime() {
  if (!window.notifSystem) return;
  const input = document.getElementById('notif-time-input');
  if (!input || !input.value) return;
  const [h, m] = input.value.split(':').map(Number);
  const prefs = window.notifSystem.getPrefs();
  prefs.hour = h;
  prefs.minute = m;
  prefs.lastScheduled = null; // force reschedule
  window.notifSystem.savePrefs(prefs);
  window.notifSystem.schedule();
  const timeStr = input.value;
  toast(`⏰ REMINDER SET FOR ${timeStr}`);
}

async function sendTestNotif() {
  if (!window.notifSystem || !window.notifSystem.isSupported()) {
    toast('NOTIFICATIONS NOT SUPPORTED');
    return;
  }
  const perm = window.notifSystem.getPermissionStatus();
  if (perm !== 'granted') {
    const granted = await window.notifSystem.requestPermission();
    if (!granted) return;
  }
  try {
    const todayData = PLAN.reduce((found, w) => {
      if (found) return found;
      for (let d = 0; d < 7; d++) {
        const dd = w.days[String(d)];
        if (dd.date === TSTR) return { sess: dd.session };
      }
      return null;
    }, null);

    const title = todayData ? ('\uD83C\uDFC3 ' + todayData.sess.name) : '\uD83D\uDECC Rest Day';
    const body  = todayData
      ? todayData.sess.desc.substring(0, 100) + '\u2026 (test notification)'
      : 'No session today \u2014 recover well. (test notification)';

    setTimeout(() => {
      try {
        new window.Notification(title, {
          body,
          icon: getNotifIconUri(),
          tag: 'test-' + Date.now()
        });
      } catch(e) { toast('NOTIFICATION FAILED: ' + e.message); }
    }, 5000);

    toast('TEST NOTIFICATION IN 5 SECONDS');
  } catch(e) {
    toast('ERROR: ' + e.message);
  }
}

// Hook into existing rStats to init notification UI after render
const _origRStats = typeof rStats === 'function' ? rStats : null;
if (_origRStats) {
  window.rStats = function() {
    _origRStats();
    setTimeout(initNotifSettingsUI, 50);
  };
  // Override the nav renders reference
  window.renders = { dash: rDash, cal: rCal, stats: window.rStats };
}
</script>

</body>
</html>
